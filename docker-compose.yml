version: '3.9'

services:

  postgres:
    image: postgres:16.3-alpine3.20
    container_name: fcit-srs-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-student_registration_system}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/enhancements.sql:/docker-entrypoint-initdb.d/02-enhancements.sql:ro
      - ./database/seeds/001_demo_users.sql:/docker-entrypoint-initdb.d/03-seed-users.sql:ro
      - ./database/seeds/002_initial_setup.sql:/docker-entrypoint-initdb.d/04-seed-setup.sql:ro
      - ./database/seeds/003_complete_curriculum.sql:/docker-entrypoint-initdb.d/05-seed-curriculum.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - fcit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-student_registration_system} -q"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  backend:
    image: fcit-srs-backend:1.0.0
    container_name: fcit-srs-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-student_registration_system}
      JWT_SECRET: ${JWT_SECRET:-fcit-srs-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-fcit-srs-refresh-change-me}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      API_RATE_LIMIT: ${API_RATE_LIMIT:-200}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3002,http://localhost:8080,http://127.0.0.1:3002}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
      - ./database:/app/database:ro
    networks:
      - fcit-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    image: fcit-srs-frontend:1.0.0
    container_name: fcit-srs-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        REACT_APP_API_URL: /api/v1
    ports:
      - "${FRONTEND_PORT:-3002}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fcit-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: fcit-srs-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fcit-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: fcit-srs-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_LEVEL: "warn"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3050:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - fcit-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  fcit-network:
    driver: bridge
    name: fcit-srs-network
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

volumes:
  postgres_data:
    driver: local
    name: fcit-srs-postgres-data
  backend_logs:
    driver: local
    name: fcit-srs-backend-logs
  prometheus_data:
    driver: local
    name: fcit-srs-prometheus-data
  grafana_data:
    driver: local
    name: fcit-srs-grafana-data
